###############################################
# MoveIt Servo parameters for Dicerox_robot_arm_URDF
# ROS2 params-file format: node_name -> ros__parameters
###############################################
servo_node:
  ros__parameters:
    moveit_servo:
      use_gazebo: false

      ## Incoming command properties
      command_in_type: "unitless"
      scale:
        linear: 0.2
        rotational: 0.35
        joint: 0.35

      ## Outgoing command properties
      publish_period: 0.034
      low_latency_mode: false

      command_out_type: trajectory_msgs/JointTrajectory
      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      ## Smoothing
      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

      ## Planning scene — set false when move_group is running alongside servo
      is_primary_planning_scene_monitor: false

      ## MoveIt properties
      move_group_name: dicerox_arm
      planning_frame: base_link

      ## Frames
      ee_frame_name: Link6
      robot_link_command_frame: base_link

      ## Stopping behaviour
      incoming_command_timeout: 0.1
      num_outgoing_halt_msgs_to_publish: 4

      ## Singularity / joint limit handling
      lower_singularity_threshold: 120.0
      hard_stop_singularity_threshold: 300.0
      joint_limit_margin: 0.1
      leaving_singularity_threshold_multiplier: 2.0

      ## Topic names
      cartesian_command_in_topic: ~/delta_twist_cmds
      joint_command_in_topic: ~/delta_joint_cmds
      joint_topic: /joint_states
      status_topic: ~/status
      command_out_topic: /dicerox_arm_controller/joint_trajectory

      ## Collision checking
      check_collisions: true
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02
