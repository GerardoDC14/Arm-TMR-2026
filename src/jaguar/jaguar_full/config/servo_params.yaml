###############################################
# MoveIt Servo parameters for jaguar_robot_full
# ROS2 params-file format: node_name -> ros__parameters
###############################################
servo_node:
  ros__parameters:
    moveit_servo:
      use_gazebo: false

      ## Incoming command properties
      ## "unitless" = servo node scales [-1, 1] input by scale.linear/rotational below.
      ## Teleop nodes output values in [-1, 1] range; these scale values are the
      ## single velocity tuning point.
      command_in_type: "unitless"
      scale:
        linear:     0.3    # max Cartesian translational velocity [m/s] at full stick
        rotational: 0.6    # max Cartesian rotational velocity [rad/s] at full stick
        joint:      1.0    # max joint velocity [rad/s] for joint jog mode

      ## Outgoing command properties
      ## 50 Hz matches spacemouse_servo publish_rate_hz.
      publish_period: 0.020
      low_latency_mode: false

      command_out_type: trajectory_msgs/JointTrajectory
      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      ## Smoothing
      ## low_latency_mode: true bypasses the servo-side Butterworth filter.
      ## spacemouse_servo already applies EMA (alpha=0.65); double-filtering adds lag.
      low_latency_mode: true
      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

      ## Planning scene — set false when move_group is running alongside servo
      is_primary_planning_scene_monitor: false

      ## MoveIt properties
      move_group_name: jaguar_arm
      planning_frame: base_link

      ## Frames
      ee_frame_name: Link6
      robot_link_command_frame: base_link

      ## Stopping behaviour
      incoming_command_timeout: 0.1   # Stop if no new command within 0.1s
      num_outgoing_halt_msgs_to_publish: 4

      ## Singularity / joint limit handling
      lower_singularity_threshold: 120.0    # start decelerating at this condition number
      hard_stop_singularity_threshold: 300.0 # emergency stop at this condition number
      joint_limit_margin: 0.1
      ## leaving_singularity_threshold_multiplier:
      ##   Arm must reach condition_number < lower/multiplier to count as "leaving".
      ##   Was 2.0 (band 60–120) — caused oscillation.  1.3 reduces ping-pong.
      leaving_singularity_threshold_multiplier: 1.3

      ## Topic names
      cartesian_command_in_topic: ~/delta_twist_cmds
      joint_command_in_topic: ~/delta_joint_cmds
      joint_topic: /joint_states
      status_topic: ~/status
      command_out_topic: /jaguar_arm_controller/joint_trajectory

      ## Collision checking
      check_collisions: true
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02
